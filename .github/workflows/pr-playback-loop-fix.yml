name: Validate and apply playback fix

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".playback-loop-fix-trigger"

permissions:
  contents: write

jobs:
  repair-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Configure commit identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Extract and run repair script
        run: |
          sed -n "/python - <<'PY'/,/^          PY$/p" .github/workflows/apply-playback-loop-fix.yml \
            | sed '1d;$d;s/^          //' > /tmp/apply-playback-fix.py
          python - <<'PY'
          from pathlib import Path

          path = Path('/tmp/apply-playback-fix.py')
          script = path.read_text()
          start = script.index('play_button = """')
          end_marker = 'app = replace_once(app, play_button, play_with_loop, "loop control")'
          end = script.index(end_marker, start) + len(end_marker)
          replacement = '''tempo_text_index = app.index('TEMPO: {tempo} BPM')
          label_marker = '<label className="flex flex-col">'
          label_index = app.rfind(label_marker, 0, tempo_text_index)
          if label_index < 0:
              raise RuntimeError('Could not locate the tempo control label')
          line_start = app.rfind('\\n', 0, label_index) + 1
          loop_button = """              <button
                type="button"
                onClick={toggleLoop}
                disabled={phase !== PRACTICE_PHASES.IDLE}
                aria-pressed={loopEnabled}
                aria-label={loopEnabled ? 'Disable progression loop' : 'Enable progression loop'}
                className={`flex h-12 items-center gap-2 rounded-2xl border px-3 text-[10px] font-black tracking-widest transition disabled:cursor-not-allowed disabled:opacity-50 md:h-14 ${loopEnabled ? 'border-cyan-300 bg-cyan-400/20 text-cyan-200 shadow-[0_0_16px_rgba(34,211,238,0.25)]' : 'border-cyan-800/60 bg-slate-950/30 text-slate-400 hover:border-cyan-500 hover:text-cyan-200'}`}
              >
                <Repeat2 className="h-4 w-4" />
                LOOP
              </button>
"""
          app = app[:line_start] + loop_button + app[line_start:]'''
          path.write_text(script[:start] + replacement + script[end:])
          PY
          set +e
          python /tmp/apply-playback-fix.py > /tmp/playback-fix-output.txt 2>&1
          status=$?
          set -e
          cat /tmp/playback-fix-output.txt
          if [ "$status" -ne 0 ]; then
            cp /tmp/playback-fix-output.txt .playback-loop-fix-error.txt
            git add .playback-loop-fix-error.txt
            git commit -m "Record playback repair validation error" || true
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
          rm -f .playback-loop-fix-error.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Normalize npm registry URLs
        run: |
          npm config set registry https://registry.npmjs.org/
          sed -i 's#https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/#https://registry.npmjs.org/#g' package-lock.json

      - name: Install and build
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Commit repair to pull request branch
        run: |
          git add src/App.jsx src/lib/audio.js .playback-loop-fix-error.txt
          git commit -m "Add progression looping and repair demo audio"
          git push origin HEAD:${{ github.head_ref }}
