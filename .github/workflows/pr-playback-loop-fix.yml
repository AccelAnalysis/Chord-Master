name: Validate and apply playback fix

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".playback-loop-fix-trigger"

permissions:
  contents: write

jobs:
  repair-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and run repair script
        run: |
          sed -n "/python - <<'PY'/,/^          PY$/p" .github/workflows/apply-playback-loop-fix.yml \
            | sed '1d;$d;s/^          //' > /tmp/apply-playback-fix.py
          python /tmp/apply-playback-fix.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Normalize npm registry URLs
        run: |
          npm config set registry https://registry.npmjs.org/
          sed -i 's#https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/#https://registry.npmjs.org/#g' package-lock.json

      - name: Install and build
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Commit repair to pull request branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx src/lib/audio.js
          git commit -m "Add progression looping and repair demo audio"
          git push origin HEAD:${{ github.head_ref }}
