name: Apply playback and loop fix

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/apply-playback-loop-fix.yml"

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply transport and audio repairs
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              if old not in text:
                  raise RuntimeError(f"Could not find replacement target: {label}")
              return text.replace(old, new, 1)

          app_path = Path("src/App.jsx")
          app = app_path.read_text()

          app = replace_once(
              app,
              "  Play,\n  RotateCcw,",
              "  Play,\n  Repeat2,\n  RotateCcw,",
              "Repeat2 import",
          )

          app = replace_once(
              app,
              "  const [countInMeasures, setCountInMeasures] = useState(1);\n  const [voicingId, setVoicingId] = useState('right-hand');",
              "  const [countInMeasures, setCountInMeasures] = useState(1);\n  const [loopEnabled, setLoopEnabled] = useState(false);\n  const [voicingId, setVoicingId] = useState('right-hand');",
              "loop state",
          )

          app = replace_once(
              app,
              "  const lastCountLabelRef = useRef('');\n  const successTimerRef = useRef(null);",
              "  const lastCountLabelRef = useRef('');\n  const loopEnabledRef = useRef(false);\n  const scheduledLoopCycleRef = useRef(0);\n  const successTimerRef = useRef(null);",
              "loop refs",
          )

          app = replace_once(
              app,
              "    currentDemoChordRef.current = -1;\n    lastCountLabelRef.current = '';\n    lastDiagnosticSignatureRef.current = '';",
              "    currentDemoChordRef.current = -1;\n    lastCountLabelRef.current = '';\n    scheduledLoopCycleRef.current = 0;\n    lastDiagnosticSignatureRef.current = '';",
              "transport loop reset",
          )

          marker = "  const animateTransport = useCallback(() => {"
          if marker not in app:
              raise RuntimeError("Could not find animateTransport marker")

          scheduler = """  const scheduleDemoCycle = useCallback((cycleStart, unitDuration) => {
    timeline.forEach((event) => {
      synth.scheduleChord(
        event.midiNotes,
        cycleStart + event.startUnit * unitDuration,
        Math.max(0.12, event.durationBeats * unitDuration * 0.96),
        0.68,
        'demo',
      );
    });

    if (metronomeMode === 'full') {
      getMetronomeEvents(totalUnits, meter, cycleStart, unitDuration)
        .forEach((event) => synth.scheduleClick(event.time, event.strength));
    }
  }, [meter, metronomeMode, timeline, totalUnits]);

"""
          app = app.replace(marker, scheduler + marker, 1)

          animate_pattern = re.compile(
              r"  const animateTransport = useCallback\(\(\) => \{.*?\n  \}, \[meter\.numerator, setActivePracticeChord, stopTransport, timeline, totalUnits\]\);",
              re.S,
          )
          animate_replacement = """  const animateTransport = useCallback(() => {
    const now = synth.currentTime;
    const progressionStart = progressionStartRef.current;
    const unitDuration = unitDurationRef.current;

    if (now < progressionStart) {
      const elapsedUnits = Math.max(0, Math.floor((now - countInStartRef.current) / unitDuration));
      const label = String((elapsedUnits % meter.numerator) + 1);
      if (label !== lastCountLabelRef.current) {
        lastCountLabelRef.current = label;
        setCountInLabel(label);
      }
      requestRef.current = requestAnimationFrame(animateTransport);
      return;
    }

    setCountInLabel('');
    if (transportKindRef.current === 'imitate') {
      requestRef.current = null;
      setPhase(PRACTICE_PHASES.WAITING_IMITATE);
      setActivePracticeChord(0);
      return;
    }

    setPhase(PRACTICE_PHASES.DEMONSTRATING);
    const elapsedUnits = (now - progressionStart) / unitDuration;

    if (loopEnabledRef.current && totalUnits > 0) {
      const cycleIndex = Math.floor(elapsedUnits / totalUnits);
      const cycleElapsedUnits = elapsedUnits - cycleIndex * totalUnits;

      if (cycleIndex >= scheduledLoopCycleRef.current) {
        const nextCycleIndex = cycleIndex + 1;
        scheduleDemoCycle(
          progressionStart + nextCycleIndex * totalUnits * unitDuration,
          unitDuration,
        );
        scheduledLoopCycleRef.current = nextCycleIndex;
      }

      setPlaybackProgress(cycleElapsedUnits / totalUnits);
      const chordIndex = timeline.findIndex((event) => (
        cycleElapsedUnits >= event.startUnit && cycleElapsedUnits < event.endUnit
      ));
      if (chordIndex >= 0 && chordIndex !== currentDemoChordRef.current) {
        currentDemoChordRef.current = chordIndex;
        setActiveChordIndex(chordIndex);
      }
      requestRef.current = requestAnimationFrame(animateTransport);
      return;
    }

    if (elapsedUnits >= totalUnits) {
      stopTransport();
      return;
    }

    setPlaybackProgress(elapsedUnits / Math.max(1, totalUnits));
    const chordIndex = timeline.findIndex((event) => elapsedUnits >= event.startUnit && elapsedUnits < event.endUnit);
    if (chordIndex >= 0 && chordIndex !== currentDemoChordRef.current) {
      currentDemoChordRef.current = chordIndex;
      setActiveChordIndex(chordIndex);
    }
    requestRef.current = requestAnimationFrame(animateTransport);
  }, [meter.numerator, scheduleDemoCycle, setActivePracticeChord, stopTransport, timeline, totalUnits]);"""
          app, count = animate_pattern.subn(animate_replacement, app, count=1)
          if count != 1:
              raise RuntimeError(f"animateTransport replacement count was {count}")

          app = replace_once(
              app,
              "    stopTransport();\n    if (!activeProgression.length) return;\n    await synth.init().catch(() => {});",
              "    stopTransport();\n    if (!activeProgression.length) return;\n\n    try {\n      await synth.init();\n    } catch (error) {\n      setFeedbackMsg('AUDIO UNAVAILABLE');\n      setFeedbackDetail(error instanceof Error ? error.message : 'The browser could not start Web Audio.');\n      return;\n    }",
              "audio initialization",
          )

          demo_pattern = re.compile(
              r"    if \(kind === 'demo'\) \{\n      timeline\.forEach\(\(event\) => \{.*?\n      \}\n    \}",
              re.S,
          )
          demo_replacement = """    if (kind === 'demo') {
      try {
        scheduleDemoCycle(progressionStart, unitDuration);
        scheduledLoopCycleRef.current = 0;
        if (loopEnabledRef.current && totalUnits > 0) {
          scheduleDemoCycle(progressionStart + totalUnits * unitDuration, unitDuration);
          scheduledLoopCycleRef.current = 1;
        }
      } catch (error) {
        stopTransport();
        setFeedbackMsg('AUDIO ERROR');
        setFeedbackDetail(error instanceof Error ? error.message : 'The progression could not be scheduled.');
        return;
      }
    }"""
          app, count = demo_pattern.subn(demo_replacement, app, count=1)
          if count != 1:
              raise RuntimeError(f"demo scheduling replacement count was {count}")

          app = replace_once(
              app,
              "  };\n\n  const advancePractice = useCallback(() => {",
              "  };\n\n  const toggleLoop = () => {\n    if (phase !== PRACTICE_PHASES.IDLE) return;\n    setLoopEnabled((enabled) => {\n      const nextEnabled = !enabled;\n      loopEnabledRef.current = nextEnabled;\n      return nextEnabled;\n    });\n  };\n\n  const advancePractice = useCallback(() => {",
              "loop toggle handler",
          )

          play_button = """              <button type=\"button\" onClick={isRunning ? stopTransport : () => startTransport('demo')} disabled={!activeProgression.length} aria-label={isRunning ? 'Stop demonstration' : 'Play demonstration'} className=\"flex h-12 w-12 items-center justify-center rounded-full bg-cyan-500 text-[#050B14] shadow-[0_0_20px_rgba(6,182,212,0.4)] transition hover:bg-cyan-400 disabled:opacity-50 md:h-14 md:w-14\">
                {isRunning ? <Square className=\"h-5 w-5 fill-current md:h-6 md:w-6\" /> : <Play className=\"ml-1 h-6 w-6 fill-current md:h-7 md:w-7\" />}
              </button>
              <label className=\"flex flex-col\">"""
          play_with_loop = """              <button type=\"button\" onClick={isRunning ? stopTransport : () => startTransport('demo')} disabled={!activeProgression.length} aria-label={isRunning ? 'Stop demonstration' : 'Play demonstration'} className=\"flex h-12 w-12 items-center justify-center rounded-full bg-cyan-500 text-[#050B14] shadow-[0_0_20px_rgba(6,182,212,0.4)] transition hover:bg-cyan-400 disabled:opacity-50 md:h-14 md:w-14\">
                {isRunning ? <Square className=\"h-5 w-5 fill-current md:h-6 md:w-6\" /> : <Play className=\"ml-1 h-6 w-6 fill-current md:h-7 md:w-7\" />}
              </button>
              <button
                type=\"button\"
                onClick={toggleLoop}
                disabled={phase !== PRACTICE_PHASES.IDLE}
                aria-pressed={loopEnabled}
                aria-label={loopEnabled ? 'Disable progression loop' : 'Enable progression loop'}
                className={`flex h-12 items-center gap-2 rounded-2xl border px-3 text-[10px] font-black tracking-widest transition disabled:cursor-not-allowed disabled:opacity-50 md:h-14 ${loopEnabled ? 'border-cyan-300 bg-cyan-400/20 text-cyan-200 shadow-[0_0_16px_rgba(34,211,238,0.25)]' : 'border-cyan-800/60 bg-slate-950/30 text-slate-400 hover:border-cyan-500 hover:text-cyan-200'}`}
              >
                <Repeat2 className=\"h-4 w-4\" />
                LOOP
              </button>
              <label className=\"flex flex-col\">"""
          app = replace_once(app, play_button, play_with_loop, "loop control")
          app_path.write_text(app)

          audio_path = Path("src/lib/audio.js")
          audio = audio_path.read_text()
          audio = replace_once(
              audio,
              "      this.masterGain.gain.value = 0.22;",
              "      this.masterGain.gain.value = 0.3;",
              "master output level",
          )
          audio = replace_once(
              audio,
              "    if (this.ctx.state === 'suspended') await this.ctx.resume();\n    return this.ctx;",
              "    if (this.ctx.state === 'suspended') await this.ctx.resume();\n    this.masterGain.gain.setValueAtTime(0.3, this.ctx.currentTime);\n    return this.ctx;",
              "audio context resume",
          )

          schedule_pattern = re.compile(
              r"  async scheduleChord\(notes, startTime, durationSeconds, velocity = 0\.7, source = 'demo'\) \{.*?\n  \}",
              re.S,
          )
          schedule_replacement = """  scheduleChord(notes, startTime, durationSeconds, velocity = 0.7, source = 'demo') {
    if (!this.ctx || !this.masterGain) {
      throw new Error('Audio engine is not initialized. Press play again to enable audio.');
    }

    const playableNotes = Array.isArray(notes)
      ? notes.filter((midi) => Number.isFinite(midi))
      : [];
    if (!playableNotes.length) return;

    const safeStartTime = Math.max(this.ctx.currentTime + 0.01, startTime);
    playableNotes.forEach((midi, index) => {
      this.createVoice({
        midi,
        velocity: Math.max(0.08, velocity - index * 0.015),
        source,
        startTime: safeStartTime,
        duration: Math.max(0.08, durationSeconds),
      });
    });
  }"""
          audio, count = schedule_pattern.subn(schedule_replacement, audio, count=1)
          if count != 1:
              raise RuntimeError(f"scheduleChord replacement count was {count}")
          audio_path.write_text(audio)
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Normalize npm registry URLs
        run: |
          npm config set registry https://registry.npmjs.org/
          sed -i 's#https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/#https://registry.npmjs.org/#g' package-lock.json

      - name: Install and build
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Commit tested repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx src/lib/audio.js
          git commit -m "Add progression looping and repair demo audio"
          git push origin main
